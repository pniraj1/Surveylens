name: Generate Keystore (Run Once)

# Run this ONCE manually to generate your keystore
# After downloading it, add it to GitHub Secrets and delete this workflow file

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias (e.g. surveylens)'
        required: true
        default: 'surveylens'
      store_password:
        description: 'Keystore password (save this!)'
        required: true
      key_password:
        description: 'Key password (save this!)'
        required: true
      organisation:
        description: 'Your name or company'
        required: true
        default: 'SurveyLens'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore surveylens-release.keystore \
            -alias ${{ github.event.inputs.key_alias }} \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=${{ github.event.inputs.organisation }}, OU=App, O=${{ github.event.inputs.organisation }}, L=City, S=State, C=US"

      - name: Show base64 (for GitHub Secret)
        run: |
          echo "=== COPY THIS INTO GitHub Secret: ANDROID_KEYSTORE_BASE64 ==="
          base64 -w 0 surveylens-release.keystore
          echo ""
          echo "=== DONE ==="

      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v4
        with:
          name: surveylens-keystore
          path: surveylens-release.keystore
          retention-days: 1
