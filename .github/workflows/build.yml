name: Build Android APK & AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      # Copy google-services.json into the Android app folder
      - name: Copy google-services.json
        run: cp google-services.json android/app/google-services.json

      - name: Decode keystore from GitHub Secret
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/surveylens.keystore

      - name: Write signing config to local.properties
        run: |
          cat >> android/local.properties << PROPS
          MYAPP_UPLOAD_STORE_FILE=surveylens.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          PROPS

      - name: Patch build.gradle for release signing
        run: |
          python3 - << 'PYEOF'
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()
          signing_block = """
              signingConfigs {
                  release {
                      def props = new Properties()
                      def pf = rootProject.file('local.properties')
                      if (pf.exists()) props.load(new FileInputStream(pf))
                      storeFile file(props['MYAPP_UPLOAD_STORE_FILE'] ?: 'surveylens.keystore')
                      storePassword props['MYAPP_UPLOAD_STORE_PASSWORD'] ?: ''
                      keyAlias props['MYAPP_UPLOAD_KEY_ALIAS'] ?: ''
                      keyPassword props['MYAPP_UPLOAD_KEY_PASSWORD'] ?: ''
                  }
              }
          """
          if 'signingConfigs' not in content:
              content = content.replace('    buildTypes {', signing_block + '    buildTypes {')
              content = content.replace('release {\n', 'release {\n            signingConfig signingConfigs.release\n', 1)
              with open('android/app/build.gradle', 'w') as f:
                  f.write(content)
          print("Done patching build.gradle")
          PYEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          JAVA_OPTS: "-Xmx4g"

      - name: Build AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon
        env:
          JAVA_OPTS: "-Xmx4g"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SurveyLens-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: SurveyLens-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
